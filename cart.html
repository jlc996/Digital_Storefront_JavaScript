<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         META DATA
    ========================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Collab Computers | Cart</title>

    <!-- =========================
         BOOTSTRAP
    ========================== -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =========================
         NAVBAR
    ========================== -->
    <header>

        <nav class="navbar navbar-expand-lg custom-navbar">

            <div class="container-fluid">

                <!-- Logo -->
                <a class="navbar-brand" href="index.html">

                    <img
                        src="assets/images/falcon-head-logo.png"
                        alt="Collab Computers Logo"
                        width="60"
                        height="40">

                    Collab Computers

                </a>

                <!-- Mobile Toggle -->
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <!-- Navigation Links -->
                <div
                    class="collapse navbar-collapse"
                    id="navbarNav">

                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="services.html">
                                Services
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="about.html">
                                About
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="reviews.html">
                                Reviews
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">
                                Contact
                            </a>
                        </li>

                        <!-- Cart Badge -->
                        <li class="nav-item ms-3">

                            <a
                                href="cart.html"
                                class="btn btn-primary position-relative cart-nav-btn">

                                Cart

                                <span
                                    id="cart-count"
                                    class="badge bg-danger position-absolute top-0 start-100 translate-middle">

                                    0

                                </span>

                            </a>

                        </li>

                    </ul>

                </div>

            </div>

        </nav>

    </header>


    <!-- =========================
         MAIN CONTENT
    ========================== -->
    <main class="container py-5">

        <!-- Page Title -->
        <h1 class="text-center mb-5">
            Shopping Cart
        </h1>

        <div class="row">

            <!-- =========================
                 CART ITEMS
            ========================== -->
            <div class="col-lg-8">

                <div
                    id="cart-container"
                    class="row g-4">

                    <!-- cart.js injects cart items -->

                </div>

            </div>

            <!-- =========================
                 ORDER SUMMARY
            ========================== -->
            <div class="col-lg-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h3 class="card-title mb-4">
                            Order Summary
                        </h3>

                        <!-- Item Count -->
                        <div class="d-flex justify-content-between mb-2">

                            <span>Items:</span>

                            <strong id="item-count">
                                0
                            </strong>

                        </div>

                        <!-- Total -->
                        <div class="d-flex justify-content-between mb-4">

                            <span>Total:</span>

                            <strong>
                                $<span id="cart-total">0.00</span>
                            </strong>

                        </div>

                        <!-- Checkout -->
                        <button
                            id="checkout-btn"
                            class="btn btn-primary w-100 mb-2">

                            Proceed To Checkout

                        </button>

                        <!-- Clear Cart -->
                        <button
                            id="clear-cart-btn"
                            class="btn btn-outline-danger w-100">

                            Clear Cart

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>


    <!-- =========================
         FOOTER
    ========================== -->
    <footer class="footer text-white mt-auto text-center py-4">

        <p>
            &copy; 2026 Collab Computers
        </p>

    </footer>


    <!-- =========================
         SCRIPTS
    ========================== -->

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Shared Service Data -->
    <script src="servicesData.js" defer></script>

    <!-- Cart System -->
    <script src="cart.js" defer></script>

</body>

</html>
