<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collab Computers | Services</title>

    <!-- bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- bootstrap icon link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">

                <a class="navbar-brand" href="index.html">
                    <img src="assets/images/falcon-head-logo.png" alt="Collab Computers Logo" width="60" height="40">
                    Collab Computers
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="services.html">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>

                        <!-- 🛒 CART BADGE -->
                        <li class="nav-item ms-3">
                            <a href="cart.html" class="btn btn-outline-light position-relative">
                                Cart
                                <span id="cart-count"
                                    class="badge bg-danger position-absolute top-0 start-100 translate-middle">
                                    0
                                </span>
                            </a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5">

        <h1 class="mb-4 text-center">Our Services</h1>

        <!-- 🔥 DYNAMIC SERVICES GO HERE -->
        <div id="services-container" class="row g-4">
            <!-- JS injects cards here -->
        </div>

    </main>

    <footer class="footer text-white mt-auto text-center py-4">
        <p>&copy; 2026 Collab Computers</p>
    </footer>

    <!-- 🔥 GLOBAL QUICK VIEW MODAL -->
    <div class="modal fade" id="serviceModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header position-relative">

                    <h5 id="modalTitle" class="modal-title w-100 text-center"></h5>

                    <button type="button" class="btn-close position-absolute end-0 me-3" data-bs-dismiss="modal"
                        aria-label="Close">
                    </button>

                </div>

                <div class="modal-body">

                    <img id="modalImage" class="img-fluid rounded mb-3" alt="Service Image">

                    <h3 id="modalPrice" class="text-primary text-center mb-2"></h3>

                    <div id="modalStars" class="text-center mb-3"></div>

                    <div id="modalDescription"></div>

                </div>

                <div class="modal-footer">
                    <button id="modalAddBtn" class="btn btn-primary">
                        Add To Cart
                    </button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Data -->
    <script src="servicesData.js" defer></script>

    <!-- Cart system -->
    <script src="cart.js" defer></script>

    <!-- Render services -->
    <script src="services.js" defer></script>

</body>

</html>
